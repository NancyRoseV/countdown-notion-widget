<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Widget</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 16px;
        }

        /* Setup Screen */
        .setup-screen {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h1 {
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 11px;
            font-weight: 500;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="datetime-local"] {
            padding: 8px 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            background: #161b22;
            color: #e6edf3;
            transition: all 0.2s;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #10b981;
            background: #0d1117;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }

        .time-options {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 5px 12px;
            border: 1px solid #30363d;
            border-radius: 5px;
            background: #161b22;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            color: #8b949e;
            transition: all 0.2s;
            font-family: inherit;
            user-select: none;
        }

        .option-btn:hover {
            border-color: #10b981;
            color: #10b981;
        }

        .option-btn.active {
            background: #059669;
            color: #ffffff;
            border-color: #059669;
        }

        .start-btn {
            padding: 10px;
            background: #10b981;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            width: 100%;
        }

        .start-btn:hover { background: #059669; }
        .start-btn:active { transform: scale(0.98); }

        /* Timer Screen */
        .timer-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .event-name {
            font-size: 15px;
            font-weight: 700;
            color: #e6edf3;
            word-break: break-word;
            line-height: 1.3;
            max-width: 100%;
        }

        .target-date {
            font-size: 11px;
            color: #6e7681;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(52px, 1fr));
            gap: 6px;
            width: 100%;
            max-width: 380px;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 10px 4px;
            min-width: 0;
        }

        .time-value {
            font-size: 22px;
            font-weight: 700;
            color: #10b981;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .time-label {
            font-size: 9px;
            color: #6e7681;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-top: 4px;
        }

        .status {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: 500;
        }

        .status.counting {
            background: rgba(16, 185, 129, 0.12);
            color: #10b981;
        }

        .status.ended {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
        }

        .back-btn {
            padding: 6px 16px;
            background: transparent;
            border: 1px solid #30363d;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 500;
            color: #8b949e;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .back-btn:hover {
            border-color: #10b981;
            color: #10b981;
        }

        .error-msg {
            color: #ef4444;
            font-size: 11px;
            padding: 6px 8px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 5px;
            display: none;
        }

        /* Compact mode for very small embeds */
        @media (max-width: 320px) {
            .container { padding: 10px; }
            .timer-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .time-unit { padding: 8px 2px; }
            .time-value { font-size: 18px; }
            .time-label { font-size: 8px; }
            .event-name { font-size: 13px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="setup-screen" id="setupScreen">
            <h1>New Countdown</h1>

            <div class="input-group">
                <label for="eventName">Event Name</label>
                <input type="text" id="eventName" placeholder="e.g., Product Launch..." autocomplete="off">
            </div>

            <div class="input-group">
                <label for="targetDate">Target Date & Time</label>
                <input type="datetime-local" id="targetDate">
            </div>

            <div class="input-group">
                <label>Display Format (Select Multiple)</label>
                <div class="time-options">
                    <button class="option-btn active" data-mode="months">Months</button>
                    <button class="option-btn active" data-mode="weeks">Weeks</button>
                    <button class="option-btn active" data-mode="days">Days</button>
                    <button class="option-btn active" data-mode="hours">Hours</button>
                    <button class="option-btn active" data-mode="minutes">Minutes</button>
                    <button class="option-btn active" data-mode="seconds">Seconds</button>
                </div>
            </div>

            <div class="error-msg" id="errorMsg"></div>
            <button class="start-btn" id="startBtn">Start Countdown</button>
        </div>

        <div class="timer-screen" id="timerScreen">
            <div class="event-name" id="displayName"></div>
            <div class="target-date" id="displayTarget"></div>
            <div class="timer-grid" id="timerDisplay"></div>
            <div class="status counting" id="status">Counting down...</div>
            <button class="back-btn" id="backBtn">New Countdown</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            let timerInterval;
            let activeModes = ['months', 'weeks', 'days', 'hours', 'minutes', 'seconds'];
            let targetTimestamp;
            let eventNameText;

            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            now.setDate(now.getDate() + 1);
            now.setMinutes(0);
            now.setSeconds(0);
            now.setMilliseconds(0);

            const dateInput = document.getElementById('targetDate');
            if (dateInput) {
                dateInput.value = now.toISOString().slice(0, 16);
            }

            document.querySelectorAll('.option-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const mode = this.dataset.mode;
                    if (this.classList.contains('active')) {
                        if (activeModes.length > 1) {
                            this.classList.remove('active');
                            activeModes = activeModes.filter(function(m) { return m !== mode; });
                        }
                    } else {
                        this.classList.add('active');
                        activeModes.push(mode);
                        const order = ['months', 'weeks', 'days', 'hours', 'minutes', 'seconds'];
                        activeModes.sort(function(a, b) {
                            return order.indexOf(a) - order.indexOf(b);
                        });
                    }
                });
            });

            const startBtn = document.getElementById('startBtn');
            if (startBtn) {
                startBtn.addEventListener('click', startCountdown);
            }

            const backBtn = document.getElementById('backBtn');
            if (backBtn) {
                backBtn.addEventListener('click', resetCountdown);
            }

            function showError(msg) {
                const errorEl = document.getElementById('errorMsg');
                if (errorEl) {
                    errorEl.textContent = msg;
                    errorEl.style.display = 'block';
                    setTimeout(function() {
                        errorEl.style.display = 'none';
                    }, 3000);
                }
            }

            function startCountdown() {
                const nameInput = document.getElementById('eventName');
                const dateInput = document.getElementById('targetDate');

                if (!nameInput || !dateInput) return;

                const nameValue = nameInput.value.trim();
                const dateValue = dateInput.value;

                if (!nameValue) {
                    showError('Please enter an event name');
                    return;
                }
                if (!dateValue) {
                    showError('Please select a date and time');
                    return;
                }

                targetTimestamp = new Date(dateValue).getTime();
                eventNameText = nameValue;

                if (isNaN(targetTimestamp)) {
                    showError('Invalid date format');
                    return;
                }

                if (targetTimestamp <= Date.now()) {
                    showError('Please select a future date and time');
                    return;
                }

                const setupScreen = document.getElementById('setupScreen');
                const timerScreen = document.getElementById('timerScreen');

                if (setupScreen) setupScreen.style.display = 'none';
                if (timerScreen) timerScreen.style.display = 'flex';

                const displayName = document.getElementById('displayName');
                const displayTarget = document.getElementById('displayTarget');

                if (displayName) displayName.textContent = eventNameText;

                if (displayTarget) {
                    const dateObj = new Date(targetTimestamp);
                    displayTarget.textContent = dateObj.toLocaleString('en-US', {
                        weekday: 'short',
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }

                updateTimer();
                timerInterval = setInterval(updateTimer, 1000);
            }

            function updateTimer() {
                const now = Date.now();
                const diff = targetTimestamp - now;

                if (diff <= 0) {
                    clearInterval(timerInterval);
                    const timerDisplay = document.getElementById('timerDisplay');
                    const status = document.getElementById('status');

                    if (timerDisplay) {
                        timerDisplay.innerHTML = '<div style="font-size: 18px; font-weight: 700; color: #ef4444; grid-column: 1 / -1;">Time is Up!</div>';
                    }
                    if (status) {
                        status.textContent = 'Event has started';
                        status.className = 'status ended';
                    }
                    return;
                }

                const units = calculateUnits(diff);
                renderTimer(units);
            }

            function calculateUnits(diff) {
                const msPerSecond = 1000;
                const msPerMinute = msPerSecond * 60;
                const msPerHour = msPerMinute * 60;
                const msPerDay = msPerHour * 24;
                const msPerWeek = msPerDay * 7;
                const msPerMonth = msPerDay * 30.44;

                let remaining = diff;
                const fullMonths = Math.floor(remaining / msPerMonth);
                remaining %= msPerMonth;
                const fullWeeks = Math.floor(remaining / msPerWeek);
                remaining %= msPerWeek;
                const fullDays = Math.floor(remaining / msPerDay);
                remaining %= msPerDay;
                const fullHours = Math.floor(remaining / msPerHour);
                remaining %= msPerHour;
                const fullMinutes = Math.floor(remaining / msPerMinute);
                remaining %= msPerMinute;
                const fullSeconds = Math.floor(remaining / msPerSecond);

                return { fullMonths, fullWeeks, fullDays, fullHours, fullMinutes, fullSeconds };
            }

            function renderTimer(u) {
                const display = document.getElementById('timerDisplay');
                if (!display) return;

                let html = '';

                const createUnit = function(val, label) {
                    return '<div class="time-unit"><div class="time-value">' + 
                           String(val).padStart(2, '0') + 
                           '</div><div class="time-label">' + label + '</div></div>';
                };

                activeModes.forEach(function(mode) {
                    let val, label;
                    switch(mode) {
                        case 'months':
                            val = u.fullMonths;
                            label = 'Mo';
                            break;
                        case 'weeks':
                            val = u.fullWeeks;
                            label = 'Wk';
                            break;
                        case 'days':
                            val = u.fullDays;
                            label = 'Day';
                            break;
                        case 'hours':
                            val = u.fullHours;
                            label = 'Hr';
                            break;
                        case 'minutes':
                            val = u.fullMinutes;
                            label = 'Min';
                            break;
                        case 'seconds':
                            val = u.fullSeconds;
                            label = 'Sec';
                            break;
                    }
                    html += createUnit(val, label);
                });

                display.innerHTML = html;
            }

            function resetCountdown() {
                clearInterval(timerInterval);
                const setupScreen = document.getElementById('setupScreen');
                const timerScreen = document.getElementById('timerScreen');
                const status = document.getElementById('status');
                const eventName = document.getElementById('eventName');

                if (timerScreen) timerScreen.style.display = 'none';
                if (setupScreen) setupScreen.style.display = 'flex';
                if (eventName) eventName.value = '';
                if (status) {
                    status.className = 'status counting';
                    status.textContent = 'Counting down...';
                }
            }
        })();
    </script>
</body>
</html>
